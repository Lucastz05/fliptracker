<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlipTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0d0f;--surface:#17171a;--surface2:#1f1f23;--border:#2a2a2f;--accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);--red:#ff4d6d;--red-dim:rgba(255,77,109,0.12);--yellow:#ffd166;--yellow-dim:rgba(255,209,102,0.12);--text:#f0f0f5;--text-muted:#7a7a8a;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(13,13,15,0.95);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:24px 28px;border-bottom:1px solid var(--border)}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700}
.stat-sub{font-size:.72rem;color:var(--text-muted);margin-top:3px}
.green{color:var(--accent)}.red{color:var(--red)}.neutral{color:var(--text)}.yellow{color:var(--yellow)}
main{padding:24px 28px;max-width:1400px;margin:0 auto}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.tabs{display:flex;gap:6px}
.tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s}
.tab.active{background:var(--accent-dim);border-color:rgba(0,229,160,.3);color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .15s,border-color .15s}
.card:hover{transform:translateY(-2px);border-color:#3a3a45}
.card.sold{opacity:.65}
.card-img{position:relative;width:100%;padding-top:70%;background:var(--surface2);overflow:hidden}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.no-img{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text-muted);font-size:.75rem;opacity:.5}
.badge{position:absolute;top:8px;right:8px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-active{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,229,160,.3)}
.badge-sold{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,109,.3)}
.badge-pending{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,209,102,.3)}
.card-body{padding:14px 16px}
.card-name{font-weight:600;font-size:.9rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-platform{font-size:.72rem;color:var(--text-muted);margin-bottom:12px}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.price-box{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px}
.price-lbl{font-size:.63rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:3px}
.price-val{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:600}
.profit-bar{background:var(--surface2);border-radius:var(--radius-sm);padding:9px 12px;display:flex;align-items:center;justify-content:space-between}
.profit-lbl{font-size:.7rem;color:var(--text-muted)}
.profit-val{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:6px}
.pct{font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:20px}
.pct-green{background:var(--accent-dim);color:var(--accent)}
.pct-red{background:var(--red-dim);color:var(--red)}
.card-actions{display:flex;gap:6px;margin-top:10px}
.btn-sm{flex:1;padding:7px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:.72rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-sm:hover{border-color:#3a3a45;color:var(--text)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.btn-primary{display:flex;align-items:center;gap:7px;padding:10px 18px;background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:6px}
.form-input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text-muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profit-preview{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.btn-cancel{padding:9px 18px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s}
.btn-cancel:hover{border-color:#3a3a45;color:var(--text)}
.img-preview-wrap{margin-top:8px;display:none;background:var(--surface2);border-radius:var(--radius-sm);padding:8px;align-items:center;gap:10px}
.img-preview-wrap.show{display:flex}
.img-preview-wrap img{width:56px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0}
.fetch-info{font-size:.75rem;color:var(--text-muted)}
.fetch-row{display:flex;gap:8px}
.btn-fetch{padding:9px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:.85rem;cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-fetch:hover{border-color:var(--accent);color:var(--accent)}
.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--text-muted)}
.empty-icon{font-size:2.5rem;margin-bottom:14px;opacity:.3}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:20px;font-weight:600;font-size:.85rem;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s}
.toast.success{background:var(--accent);color:#0d0d0f}
.toast.error{background:var(--red);color:#fff}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#2a2a2f;border-radius:4px}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);padding:14px}.top-bar{flex-direction:column;align-items:flex-start;gap:10px}header{padding:14px 16px}main{padding:14px}}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>FlipTracker</div>
  <button class="btn-primary" onclick="openModal()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Ajouter un article
  </button>
</header>

<div class="stats">
  <div class="stat-card"><div class="stat-label">Investi</div><div class="stat-value neutral" id="s-invested">0,00 €</div><div class="stat-sub" id="s-items">0 article(s)</div></div>
  <div class="stat-card"><div class="stat-label">Revenus</div><div class="stat-value green" id="s-revenue">0,00 €</div><div class="stat-sub" id="s-sold">0 vendu(s)</div></div>
  <div class="stat-card"><div class="stat-label">Bénéfice net</div><div class="stat-value green" id="s-profit">0,00 €</div><div class="stat-sub" id="s-roi">ROI : 0 %</div></div>
  <div class="stat-card"><div class="stat-label">Stock</div><div class="stat-value yellow" id="s-stock">0,00 €</div><div class="stat-sub" id="s-stock-count">0 en cours</div></div>
</div>

<main>
  <div class="top-bar">
    <div class="tabs">
      <button class="tab active" onclick="setFilter('all',this)">Tous</button>
      <button class="tab" onclick="setFilter('active',this)">En vente</button>
      <button class="tab" onclick="setFilter('sold',this)">Vendus</button>
      <button class="tab" onclick="setFilter('pending',this)">Attente</button>
    </div>
    <span id="count-label" style="font-size:.8rem;color:var(--text-muted)"></span>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modal-title">Nouvel article</h2>
    <div class="form-group">
      <label class="form-label">Lien de l'article</label>
      <div class="fetch-row">
        <input class="form-input" id="f-url" type="url" placeholder="https://www.vinted.fr/items/…" style="flex:1"/>
        <button class="btn-fetch" id="btn-fetch" onclick="fetchImg()">📷 Image</button>
      </div>
      <div class="img-preview-wrap" id="imgPreview">
        <img id="previewImg" src="" alt=""/>
        <span class="fetch-info" id="fetchInfo">Image récupérée ✓</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nom *</label>
      <input class="form-input" id="f-name" placeholder="Ex : Nike Air Max 90 – T43"/>
    </div>
    <div class="form-group">
      <label class="form-label">Plateforme</label>
      <input class="form-input" id="f-platform" placeholder="Vinted, LeBonCoin, eBay…"/>
    </div>
    <div class="form-group">
      <label class="form-label">URL image directe (si auto échoue)</label>
      <input class="form-input" id="f-img" type="url" placeholder="https://…/photo.jpg" oninput="onManualImg()"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prix achat (€) *</label>
        <input class="form-input" id="f-buy" type="number" min="0" step="0.01" placeholder="0.00" oninput="updatePreview()"/>
      </div>
      <div class="form-group">
        <label class="form-label">Prix vente (€)</label>
        <input class="form-input" id="f-sell" type="number" min="0" step="0.01" placeholder="0.00" oninput="updatePreview()"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Frais (livraison, commission…) (€)</label>
      <input class="form-input" id="f-fees" type="number" min="0" step="0.01" placeholder="0.00" oninput="updatePreview()"/>
    </div>
    <div class="profit-preview">
      <span style="font-size:.78rem;color:var(--text-muted)">Bénéfice estimé</span>
      <span id="profit-preview" style="font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:var(--text-muted)">— €</span>
    </div>
    <div class="form-group">
      <label class="form-label">Statut</label>
      <select class="form-input" id="f-status">
        <option value="active">En vente</option>
        <option value="sold">Vendu</option>
        <option value="pending">En attente</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input class="form-input" id="f-notes" placeholder="Taille, état, remarques…"/>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveItem()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
let items = [], filter = 'all', editId = null;

const fmt = n => new Intl.NumberFormat('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n)+' €';
const pct = (profit,buy) => buy>0 ? `${profit>=0?'+':''}${((profit/buy)*100).toFixed(0)}%` : null;

// ── API ──
async function api(path, method='GET', body=null){
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch('/api'+path, opts);
  return r.json();
}

async function loadItems(){
  items = await api('/items');
  render();
}

// ── STATS ──
function updateStats(){
  const sold  = items.filter(i=>i.status==='sold');
  const stock = items.filter(i=>i.status!=='sold');
  const invested  = items.reduce((s,i)=>s+(parseFloat(i.buy)||0),0);
  const revenue   = sold.reduce((s,i)=>s+(parseFloat(i.sell)||0),0);
  const costSold  = sold.reduce((s,i)=>s+(parseFloat(i.buy)||0)+(parseFloat(i.fees)||0),0);
  const profit    = revenue - costSold;
  const roi       = costSold>0?((profit/costSold)*100).toFixed(1):0;
  const stockVal  = stock.reduce((s,i)=>s+(parseFloat(i.buy)||0),0);

  document.getElementById('s-invested').textContent = fmt(invested);
  document.getElementById('s-revenue').textContent  = fmt(revenue);
  document.getElementById('s-profit').textContent   = fmt(profit);
  document.getElementById('s-stock').textContent    = fmt(stockVal);
  document.getElementById('s-items').textContent    = `${items.length} article(s) total`;
  document.getElementById('s-sold').textContent     = `${sold.length} vendu(s)`;
  document.getElementById('s-roi').textContent      = `ROI : ${roi} %`;
  document.getElementById('s-stock-count').textContent = `${stock.length} en cours`;
  document.getElementById('s-profit').className = 'stat-value '+(profit>=0?'green':'red');
}

// ── RENDER ──
function render(){
  updateStats();
  const filtered = filter==='all' ? items : items.filter(i=>i.status===filter);
  document.getElementById('count-label').textContent = `${filtered.length} article(s)`;
  const grid = document.getElementById('grid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><h3 style="color:var(--text);margin-bottom:6px">Aucun article ici</h3><p style="font-size:.85rem">Clique sur "Ajouter un article" pour commencer.</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(cardHTML).join('');
}

function cardHTML(item){
  const b=parseFloat(item.buy)||0, s=parseFloat(item.sell)||0, fe=parseFloat(item.fees)||0;
  const profit=s-b-fe, hasSell=item.sell!==''&&item.sell!==null&&item.sell!==undefined&&item.sell!=='';
  const p = hasSell ? pct(profit,b) : null;
  const pc = profit>=0;
  const bdg = {active:'badge-active',sold:'badge-sold',pending:'badge-pending'}[item.status]||'badge-pending';
  const lbl = {active:'En vente',sold:'Vendu',pending:'Attente'}[item.status]||'';
  const imgHTML = item.img
    ? `<img src="${item.img}" alt="${item.name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/><div class="no-img" style="display:none">📷<span>Pas d'image</span></div>`
    : `<div class="no-img">📷<span>Pas d'image</span></div>`;
  return `<div class="card ${item.status==='sold'?'sold':''}">
    <div class="card-img">${imgHTML}<span class="badge ${bdg}">${lbl}</span></div>
    <div class="card-body">
      <div class="card-name" title="${item.name}">${item.name}</div>
      <div class="card-platform">${item.platform||'—'}${item.notes?' · '+item.notes:''}</div>
      <div class="price-row">
        <div class="price-box"><div class="price-lbl">Achat</div><div class="price-val">${fmt(b)}</div></div>
        <div class="price-box"><div class="price-lbl">Vente</div><div class="price-val" style="color:${hasSell?'var(--text)':'var(--text-muted)'}">${hasSell?fmt(s):'—'}</div></div>
      </div>
      ${hasSell?`<div class="profit-bar"><span class="profit-lbl">Bénéfice${fe>0?' (frais incl.)':''}</span><span class="profit-val" style="color:${pc?'var(--accent)':'var(--red)'}">${pc?'+':''}${fmt(profit)}${p?`<span class="pct ${pc?'pct-green':'pct-red'}">${p}</span>`:''}</span></div>`
      :`<div class="profit-bar"><span class="profit-lbl">Prix de vente non défini</span><span style="color:var(--text-muted)">—</span></div>`}
      <div class="card-actions">
        <button class="btn-sm" onclick="editItem('${item.id}')">✏️ Modifier</button>
        ${item.url?`<button class="btn-sm" onclick="window.open('${item.url}','_blank')">🔗 Lien</button>`:''}
        <button class="btn-sm danger" onclick="deleteItem('${item.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

// ── FILTER ──
function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── MODAL ──
function openModal(item=null){
  editId=item?item.id:null;
  document.getElementById('modal-title').textContent=item?"Modifier l'article":"Nouvel article";
  ['url','name','platform','img','buy','sell','fees','notes'].forEach(k=>{
    document.getElementById('f-'+k).value=item?.[k]||'';
  });
  document.getElementById('f-status').value=item?.status||'active';
  document.getElementById('imgPreview').classList.remove('show');
  if(item?.img) showPreview(item.img,'');
  updatePreview();
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');editId=null;}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});

// ── FETCH IMAGE ──
async function fetchImg(){
  const url=document.getElementById('f-url').value.trim();
  if(!url)return;
  const btn=document.getElementById('btn-fetch');
  btn.textContent='…'; btn.disabled=true;
  document.getElementById('fetchInfo').textContent='Récupération…';
  document.getElementById('imgPreview').classList.add('show');
  try{
    const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    const html=await res.text();
    const doc=new DOMParser().parseFromString(html,'text/html');
    let imgUrl=doc.querySelector('meta[property="og:image"]')?.getAttribute('content')
      ||doc.querySelector('meta[name="twitter:image"]')?.getAttribute('content')
      ||doc.querySelector('meta[itemprop="image"]')?.getAttribute('content');
    if(!imgUrl){const fi=doc.querySelector('img[src]');if(fi){imgUrl=fi.getAttribute('src');if(imgUrl?.startsWith('/')){const u=new URL(url);imgUrl=u.origin+imgUrl;}}}
    if(imgUrl){
      document.getElementById('f-img').value=imgUrl;
      showPreview(imgUrl,'✓ Image récupérée');
      const nameField=document.getElementById('f-name');
      if(!nameField.value){
        const t=doc.querySelector('meta[property="og:title"]')?.getAttribute('content')||doc.title||'';
        nameField.value=t.substring(0,80);
      }
    } else {
      document.getElementById('fetchInfo').textContent='Aucune image — colle une URL directe ci-dessous';
    }
  }catch{document.getElementById('fetchInfo').textContent='Échec — colle une URL directe ci-dessous';}
  btn.textContent='📷 Image'; btn.disabled=false;
}

function onManualImg(){
  const url=document.getElementById('f-img').value.trim();
  if(url) showPreview(url,'Aperçu');
}

function showPreview(src,info){
  document.getElementById('previewImg').src=src;
  document.getElementById('fetchInfo').textContent=info;
  document.getElementById('imgPreview').classList.add('show');
}

// ── PROFIT PREVIEW ──
function updatePreview(){
  const b=parseFloat(document.getElementById('f-buy').value)||0;
  const s=parseFloat(document.getElementById('f-sell').value)||0;
  const fe=parseFloat(document.getElementById('f-fees').value)||0;
  const el=document.getElementById('profit-preview');
  if(!b&&!s){el.textContent='— €';el.style.color='var(--text-muted)';return;}
  const profit=s-b-fe;
  const p=b>0?` (${profit>=0?'+':''}${((profit/b)*100).toFixed(0)}%)`:'';
  el.textContent=`${profit>=0?'+':''}${fmt(profit)}${p}`;
  el.style.color=profit>=0?'var(--accent)':'var(--red)';
}

// ── CRUD ──
async function saveItem(){
  const name=document.getElementById('f-name').value.trim();
  const buy=document.getElementById('f-buy').value;
  if(!name){toast('Le nom est requis','error');return;}
  if(!buy){toast('Le prix d\'achat est requis','error');return;}
  const data={
    url:document.getElementById('f-url').value.trim(),
    name,platform:document.getElementById('f-platform').value.trim(),
    img:document.getElementById('f-img').value.trim(),
    buy,sell:document.getElementById('f-sell').value,
    fees:document.getElementById('f-fees').value,
    status:document.getElementById('f-status').value,
    notes:document.getElementById('f-notes').value.trim()
  };
  if(editId){
    const updated=await api('/items/'+editId,'PUT',data);
    items=items.map(i=>i.id===editId?updated:i);
    toast('Article modifié ✓');
  } else {
    const created=await api('/items','POST',data);
    items.unshift(created);
    toast('Article ajouté ✓');
  }
  closeModal(); render();
}

async function deleteItem(id){
  if(!confirm('Supprimer cet article ?'))return;
  await api('/items/'+id,'DELETE');
  items=items.filter(i=>i.id!==id);
  toast('Supprimé','error'); render();
}

function editItem(id){
  const item=items.find(i=>i.id===id);
  if(item) openModal(item);
}

// ── TOAST ──
function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

loadItems();
</script>
</body>
</html>
